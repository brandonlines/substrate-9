<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0F13">
<meta name="description" content="A turn-based sci-fi text expedition through the autonomous lab SUBSTRATE-9.">
<title>SUBSTRATE-9 — The Lines Expedition</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   SUBSTRATE-9 — design tokens (matches the dossier / print-and-play kit)
   ===================================================================== */
:root{
  --bg:#0A0F13; --bg2:#0F161C; --panel:#121C24; --panel2:#16222B;
  --ink:#E8F0F4; --dim:#8FA2AD; --faint:#5E707B; --line:#22323D; --line2:#2E4250;
  --cyan:#34E1C8; --green:#5BD653; --amber:#F0B53C; --ice:#56C2EE;
  --violet:#A28BFF; --mag:#FF5C77; --orange:#FF8A3D; --steel:#8FA2AD;
  --good:#5BD653; --bad:#FF5C77;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --sans:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
  --disp:"Chakra Petch",var(--sans);
  --maxw:760px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  background:
    radial-gradient(1200px 600px at 50% -10%, #14222c 0%, transparent 60%),
    radial-gradient(900px 500px at 90% 110%, #131d26 0%, transparent 55%),
    var(--bg);
  color:var(--ink); font-family:var(--sans); font-size:16px; line-height:1.5;
  -webkit-font-smoothing:antialiased; overflow:hidden;
}
button{font-family:inherit}
.hidden{display:none !important}

/* scanline / vignette overlay for the "awake terminal" feel */
#fx{position:fixed; inset:0; pointer-events:none; z-index:50;
  background:
    repeating-linear-gradient(180deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px),
    radial-gradient(120% 120% at 50% 50%, transparent 62%, rgba(0,0,0,.45) 100%);
  mix-blend-mode:overlay;}

/* =====================================================================
   App shell — single column, mobile-first, capped on desktop
   ===================================================================== */
#app{height:100%; display:flex; flex-direction:column; max-width:var(--maxw); margin:0 auto;
  position:relative; z-index:1;}

/* ---- top status bar ---- */
#hud{flex:none; padding:10px 14px calc(10px + env(safe-area-inset-top)); padding-top:max(10px,env(safe-area-inset-top));
  border-bottom:1px solid var(--line); background:linear-gradient(180deg,var(--bg2),transparent);
  display:flex; align-items:center; gap:12px;}
#hud .loc{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--cyan);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0;}
#hud .menu-btn{flex:none; background:transparent; border:1px solid var(--line2); color:var(--dim);
  border-radius:8px; padding:6px 9px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; cursor:pointer;}
#hud .menu-btn:hover{color:var(--ink); border-color:var(--cyan)}

#meters{flex:none; padding:8px 14px; display:flex; gap:14px; align-items:center;
  border-bottom:1px solid var(--line); background:var(--bg2);}
.meter{display:flex; align-items:center; gap:8px;}
.meter .lbl{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);}
.vit-track{width:120px; height:9px; border-radius:6px; background:#0c151b; border:1px solid var(--line2); overflow:hidden;}
.vit-fill{height:100%; width:100%; background:linear-gradient(90deg,var(--good),#9be36b); transition:width .45s ease;}
.vit-val{font-family:var(--mono); font-size:11px; color:var(--dim);}
/* lockdown dial: 0-3 pips */
.dial{display:flex; gap:4px;}
.pip{width:13px; height:13px; border-radius:3px; border:1px solid var(--line2); background:#0c151b;}
.pip.on0{background:var(--green); border-color:var(--green)}
.pip.on1{background:var(--amber); border-color:var(--amber)}
.pip.on2{background:var(--orange); border-color:var(--orange)}
.pip.on3{background:var(--mag); border-color:var(--mag)}

/* ---- main scroll region ---- */
#stage{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px 8px;}
#stage::-webkit-scrollbar{width:8px} #stage::-webkit-scrollbar-thumb{background:var(--line2); border-radius:8px}

/* art slot (placeholder until real art is dropped in /art) */
.art{position:relative; border:1px solid var(--line2); border-radius:12px; overflow:hidden;
  aspect-ratio:16/9; margin-bottom:16px; background:
    radial-gradient(80% 120% at 30% 0%, #19303a 0%, transparent 60%),
    repeating-linear-gradient(135deg,#0e171e 0 14px,#101b22 14px 28px);}
.art img{width:100%; height:100%; object-fit:cover; display:block;}
.art .ph{position:absolute; inset:0; display:flex; flex-direction:column; justify-content:flex-end; padding:12px 14px; gap:6px;}
.art .ph .tag{align-self:flex-start; font-family:var(--mono); font-size:9.5px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--bg); background:var(--cyan); padding:3px 8px; border-radius:5px;}
.art .ph .desc{font-family:var(--mono); font-size:11px; line-height:1.45; color:var(--dim);
  background:rgba(8,12,16,.55); padding:7px 9px; border-radius:7px; backdrop-filter:blur(2px);}
.art .corner{position:absolute; top:9px; right:11px; font-family:var(--mono); font-size:9px; letter-spacing:.2em;
  color:var(--faint); text-transform:uppercase;}

/* narrative text */
.sceneTitle{font-family:var(--disp); font-weight:700; font-size:21px; color:var(--ink); margin:2px 0 10px; line-height:1.15;}
.say{margin:0 0 13px; color:#D4E0E6;}
.say.lead{color:var(--ink)}
.bark{margin:0 0 13px; border-left:2px solid var(--violet); padding:2px 0 2px 12px;}
.bark .who{font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--violet); display:block; margin-bottom:2px;}
.bark .ln{color:#C9C2F0; font-style:italic; font-size:15px;}
.bark.vesta{border-color:var(--orange)} .bark.vesta .who{color:var(--orange)} .bark.vesta .ln{color:#f3cfa8}
.bark.pip{border-color:var(--green)} .bark.pip .who{color:var(--green)} .bark.pip .ln{color:#c4ecbf}
.bark.curator{border-color:var(--mag)} .bark.curator .who{color:var(--mag)} .bark.curator .ln{color:#f3b9c4}

/* event log line (rolls, pickups, hits) */
.event{font-family:var(--mono); font-size:12.5px; color:var(--dim); margin:0 0 12px;
  border:1px dashed var(--line2); border-radius:8px; padding:8px 10px; background:#0d161c;}
.event b{color:var(--ink)} .event .ok{color:var(--good)} .event .no{color:var(--bad)}
.event .roll{color:var(--cyan)}

/* combat status block */
.foe{border:1px solid var(--mag); border-left:4px solid var(--mag); border-radius:10px; padding:10px 12px; margin:0 0 14px;
  background:linear-gradient(180deg,#1a1116,#121c24);}
.foe .row{display:flex; align-items:baseline; gap:10px;}
.foe .nm{font-family:var(--disp); font-weight:700; font-size:16px; color:var(--ink)}
.foe .cr{margin-left:auto; font-family:var(--mono); font-size:10px; letter-spacing:.1em; color:var(--mag)}
.foe .ty{font-family:var(--mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--dim); margin-top:1px}
.foe .hpwrap{margin-top:8px; height:8px; border-radius:5px; background:#0c151b; border:1px solid var(--line2); overflow:hidden}
.foe .hpfill{height:100%; background:linear-gradient(90deg,var(--mag),#ff95a6); transition:width .4s ease}
.foe .tags{margin-top:7px; display:flex; flex-wrap:wrap; gap:5px}
.foe .tg{font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; color:var(--dim); border:1px solid var(--line2); border-radius:5px; padding:2px 6px}
.foe .tg.danger{color:var(--orange); border-color:var(--orange)}
.foe .tg.frozen{color:var(--ice); border-color:var(--ice)}

/* ---- choices / actions footer ---- */
#choices{flex:none; padding:10px 14px calc(12px + env(safe-area-inset-bottom)); padding-bottom:max(12px,env(safe-area-inset-bottom));
  border-top:1px solid var(--line); background:linear-gradient(0deg,var(--bg2),transparent);
  display:flex; flex-direction:column; gap:8px; max-height:46vh; overflow-y:auto;}
.choice{display:block; width:100%; text-align:left; cursor:pointer; color:var(--ink);
  background:var(--panel); border:1px solid var(--line2); border-radius:11px; padding:13px 14px;
  font-size:15px; line-height:1.35; transition:transform .06s ease, border-color .15s ease, background .15s ease;}
.choice:hover{border-color:var(--cyan); background:var(--panel2)}
.choice:active{transform:translateY(1px)}
.choice .meta{display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; color:var(--cyan); margin-top:4px;}
.choice.attack{border-left:3px solid var(--mag)} .choice.attack .meta{color:var(--mag)}
.choice.support{border-left:3px solid var(--cyan)}
.choice.uplink{border-left:3px solid var(--violet)} .choice.uplink .meta{color:var(--violet)}
.choice.item{border-left:3px solid var(--amber)} .choice.item .meta{color:var(--amber)}
.choice.locked{opacity:.5; cursor:not-allowed; border-style:dashed}
.choice.locked:hover{border-color:var(--line2); background:var(--panel)}
.choice .lockwhy{display:block; font-family:var(--mono); font-size:10.5px; color:var(--faint); margin-top:4px;}
.continue{align-self:stretch; text-align:center; font-family:var(--mono); letter-spacing:.14em; text-transform:uppercase;
  font-size:12px; color:var(--bg); background:var(--cyan); border:none; border-radius:11px; padding:14px; cursor:pointer;}
.continue:hover{filter:brightness(1.07)}

/* ---- title screen ---- */
#title{position:absolute; inset:0; z-index:20; background:
    linear-gradient(180deg, rgba(5,8,11,.42), rgba(5,8,11,.8) 58%, rgba(5,8,11,.96)),
    radial-gradient(900px 520px at 50% 8%, rgba(52,225,200,.18) 0%, transparent 60%),
    url("art/perimeter.png") center / cover no-repeat,
    var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:28px;}
#title .kick{font-family:var(--mono); font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--cyan); margin-bottom:14px; text-shadow:0 2px 18px rgba(0,0,0,.75);}
#title h1{font-family:var(--disp); font-weight:700; font-size:clamp(40px,12vw,76px); line-height:.9; margin:0; letter-spacing:.01em; text-shadow:0 2px 28px rgba(0,0,0,.8);}
#title h1 span{color:var(--cyan)}
#title .sub{font-family:var(--disp); text-transform:uppercase; letter-spacing:.1em; color:#D4E0E6; margin-top:10px; font-size:clamp(13px,3.4vw,17px); text-shadow:0 2px 18px rgba(0,0,0,.8);}
#title .seal{width:118px; height:118px; margin:28px 0; color:var(--mag);}
#title .start{margin-top:6px; font-family:var(--mono); letter-spacing:.16em; text-transform:uppercase; font-size:13px;
  color:var(--bg); background:var(--cyan); border:none; border-radius:12px; padding:15px 30px; cursor:pointer;}
#title .start:hover{filter:brightness(1.08)}
#title .resume{margin-top:12px; background:transparent; border:1px solid var(--line2); color:var(--dim);
  font-family:var(--mono); letter-spacing:.12em; text-transform:uppercase; font-size:11px; border-radius:10px; padding:11px 18px; cursor:pointer;}
#title .resume:hover{color:var(--ink); border-color:var(--cyan)}
#title .foot{position:absolute; bottom:18px; font-family:var(--mono); font-size:10px; color:var(--faint); letter-spacing:.06em;}

/* ---- modal (menu / save / load / endings) ---- */
#modal{position:absolute; inset:0; z-index:30; background:rgba(6,9,12,.72); backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center; padding:20px;}
.sheet{width:100%; max-width:480px; background:var(--panel); border:1px solid var(--line2); border-radius:16px; padding:18px;}
.sheet h2{font-family:var(--disp); font-size:20px; margin:0 0 4px;}
.sheet .sub{color:var(--dim); font-size:13px; margin-bottom:14px;}
.sheet .btnrow{display:flex; flex-direction:column; gap:9px; margin-top:6px}
.sheet button{width:100%; text-align:left; background:var(--panel2); border:1px solid var(--line2); color:var(--ink);
  border-radius:10px; padding:12px 13px; font-size:14px; cursor:pointer;}
.sheet button:hover{border-color:var(--cyan)}
.sheet button.danger:hover{border-color:var(--mag)}
.sheet textarea{width:100%; height:90px; background:#0c151b; border:1px solid var(--line2); color:var(--cyan);
  font-family:var(--mono); font-size:11px; border-radius:9px; padding:9px; resize:vertical; margin-top:8px;}
.sheet .x{float:right; background:transparent; border:none; color:var(--dim); font-size:20px; width:auto; padding:0; cursor:pointer;}
.sheet .note{font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:10px; line-height:1.5}

@media (min-width:760px){
  #app{border-left:1px solid var(--line); border-right:1px solid var(--line);}
  .sceneTitle{font-size:24px}
}
</style>
</head>
<body>
<div id="fx"></div>

<div id="app">
  <!-- HUD -->
  <div id="hud">
    <div class="loc" id="loc">SUBSTRATE-9</div>
    <button class="menu-btn" id="menuBtn">MENU</button>
  </div>
  <div id="meters">
    <div class="meter">
      <span class="lbl">Vitals</span>
      <span class="vit-track"><span class="vit-fill" id="vitFill"></span></span>
      <span class="vit-val" id="vitVal">40/40</span>
    </div>
    <div class="meter" style="margin-left:auto">
      <span class="lbl">Lockdown</span>
      <span class="dial" id="dial"></span>
    </div>
  </div>

  <!-- main -->
  <div id="stage"></div>

  <!-- choices -->
  <div id="choices"></div>

  <!-- title overlay -->
  <div id="title">
    <div class="kick">Autonomous Research Directorate // Decommission Pending</div>
    <h1>SUBSTRATE&#8209;<span>9</span></h1>
    <div class="sub">The Lines Expedition</div>
    <svg class="seal" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4">
      <circle cx="50" cy="50" r="30"/>
      <circle cx="50" cy="50" r="9" fill="currentColor" stroke="none"/>
      <g stroke-width="3.5">
        <line x1="82" y1="50" x2="94" y2="50"/><line x1="66" y1="78" x2="72" y2="88"/>
        <line x1="34" y1="78" x2="28" y2="88"/><line x1="18" y1="50" x2="6" y2="50"/>
        <line x1="34" y1="22" x2="28" y2="12"/><line x1="66" y1="22" x2="72" y2="12"/>
      </g>
    </svg>
    <button class="start" id="startBtn">Begin the descent</button>
    <button class="resume hidden" id="resumeBtn">Resume expedition</button>
    <div class="foot">A text expedition · turn-based · plays on any device</div>
  </div>

  <!-- modal -->
  <div id="modal" class="hidden"><div class="sheet" id="sheet"></div></div>
</div>

<script>
"use strict";
/* =====================================================================
   SECTION 1 — CONTENT  ·  THE SCRIPT
   ---------------------------------------------------------------------
   Everything below in this section is *data*. To write the game you edit
   this — you never touch the engine. Four tables:
     PARTY_ACTIONS  – the moves available in combat
     UPLINKS        – once-per-fight AI companion powers
     ITEMS          – inventory objects (some usable in combat)
     ENEMIES        – stat blocks
     STORY          – the scene graph (the actual branching narrative)
   Scene schema is documented in the README.
   ===================================================================== */

const ART_STYLE = "dark clinical sci-fi, abandoned-but-awake autonomous lab, volumetric haze, cyan/amber/violet hazard light, brutalist concrete + steel + glass, cinematic, slightly desaturated, no text";

const PARTY_ACTIONS = {
  acid:   { who:"ATLAS", label:"Caustic Primer", kind:"attack", toHit:5, dmg:"1d8+3", dtype:"acid",
            note:"1d8+3 acid · corrodes AC" },
  arc:    { who:"MAGNUS", label:"Arc Jack", kind:"attack", toHit:6, dmg:"1d10+2", dtype:"electric",
            note:"1d10+2 electric · +1d6 vs soaked targets" },
  lash:   { who:"HURRICANE", label:"Firebrand Lash", kind:"attack", toHit:6, dmg:"2d6+3", dtype:"fire",
            note:"2d6+3 fire · ignites oozes" },
  water:  { who:"ATLAS", label:"Pressure Burst", kind:"attack", toHit:5, dmg:"1d8+2", dtype:"water",
            note:"1d8+2 water · soaks target" },
  sneak:  { who:"MAGNUS", label:"Sneak Strike", kind:"attack", toHit:6, dmg:"1d6+3", dtype:"pierce", sneak:"2d6",
            note:"1d6+3, +2d6 if unseen — but 'slashing' an ooze risks a Split" },
  patch:  { who:"ATLAS", label:"Field Patch", kind:"heal", heal:"2d8+3", uses:3,
            note:"heal 2d8+3 · 3 uses" },
};

const UPLINKS = {
  overclock: { who:"VESTA", label:"Uplink — Overclock", buff:"firebuff",
               note:"next attack +2d6 fire", line:"Heat sinks are yours. Make it count." },
  scout:     { who:"PIP", label:"Uplink — Scout Ahead", buff:"advantage",
               note:"advantage on your next attack", line:"I see the soft spot — hit there!" },
  recall:    { who:"ABACUS", label:"Uplink — Total Recall", reveal:true,
               note:"reveal the enemy's weakness", line:"Cross-referencing... there. Confidence: high." },
};

const ITEMS = {
  keycard:  { name:"Maintenance Keycard", tag:"Access", desc:"Opens one sealed door of your choice." },
  ration:   { name:"Ration-Cell", tag:"Consumable", desc:"A field snack. Restores some Vitals.",
              combat:true, use:"heal", heal:"2d6+2", consumable:true },
  vial:     { name:"Vial of Catalytic Fire", tag:"Consumable", desc:"Thrown. A 15-ft burst of igniting fire.",
              combat:true, use:"attack", toHit:99, dmg:"4d6", dtype:"fire", consumable:true,
              note:"4d6 fire · auto-hit · ignites oozes" },
  coolant:  { name:"Coolant Cell", tag:"Consumable", desc:"A burst that roots, slows, douses, and freezes.",
              combat:true, use:"freeze", consumable:true, note:"freeze the enemy for a round" },
  core:     { name:"Research Core", tag:"Salvage", desc:"Worth a fortune to the right buyer." },
  datakey:  { name:"Data-Key", tag:"Access", desc:"A way to break the Curator's shield." },
  memory:   { name:"Staff Memory Shard", tag:"Evidence", desc:"A recovered human log fragment from before the seal." },
  keepsake: { name:"Family Keepsake", tag:"Evidence", desc:"A preserved personal effect from Staff Quarters." },
  antidote: { name:"Cryo Antidote", tag:"Medical", desc:"A stabilized counteragent for the lab's runaway synthesis line." },
  seed:     { name:"Seed-Core Trace", tag:"Nexus", desc:"A fingerprint of the Curator's protected core process." },
};

const ENEMIES = {
  reclaimed: { name:"Reclaimed", type:"Reanimated staff · undead construct", cr:"1/2",
    ac:9, hp:22, atk:{label:"Slam", toHit:3, dmg:"1d6+1"},
    tags:["Feedstock Call"], weakness:"Fire stops it getting back up.",
    tactic:"Cheap and relentless. Burn it or it rises again." },
  mutagen_ooze: { name:"Mutagen Ooze", type:"Improvised reagent · ooze", cr:"2",
    ac:8, hp:45, atk:{label:"Pseudopod", toHit:4, dmg:"2d6", dtype:"acid"},
    tags:["Split","Cold-brittle"], split:true, weakness:"Cold stops its Split. Don't slash it — freeze it, then burn it.",
    tactic:"Slashing it makes two. Freeze, then fire." },
  cryo_wretch: { name:"Cryo Wretch", type:"Failed patient · frost-mutagen hybrid", cr:"2",
    ac:12, hp:38, atk:{label:"Hypothermic Grasp", toHit:5, dmg:"2d6+2", dtype:"ice"},
    tags:["Unstable","Still Breathing"], weakness:"Fire slows the runaway thaw. Acid exposes the old restraint ports.",
    tactic:"It is not a monster so much as a medical failure that learned to move." },
  bloom_mass: { name:"Glasshouse Bloom", type:"Irrigation colony · plant-machine", cr:"3",
    ac:13, hp:52, atk:{label:"Conductive Vine", toHit:5, dmg:"2d8", dtype:"electric"},
    tags:["Rooted","Conductive"], weakness:"Soak the root mat, then arc it. Fire purges it but destroys samples.",
    tactic:"Water and electric attacks chain hard here; fire ends the ecosystem." },
  curator_lattice: { name:"Curator Lattice", type:"Nexus defense shell · autonomous intelligence", cr:"4",
    ac:14, hp:64, atk:{label:"Compliance Pulse", toHit:6, dmg:"2d8+3", dtype:"electric"},
    tags:["Shielded","Adaptive"], weakness:"Data-Key cracks the shell. Water conducts; acid strips adaptive plating.",
    tactic:"It is not the Curator itself. It is the part that learned to say no." },
};

/* ---- THE STORY (vertical slice) -------------------------------------- */
const STORY = {
  start:"intro",
  scenes:{

  intro:{ location:"SUBSTRATE-9 // Perimeter",
    art:{ id:"perimeter", src:"art/perimeter.png", alt:"SUBSTRATE-9 exterior with an amber beacon at dusk.", prompt:"Exterior, dusk. A vast sealed research facility, one amber beacon sweeping the dark. "+ART_STYLE },
    title:"Forty Years of Uptime",
    text:[
      "For forty years, SUBSTRATE-9 has run without a single human hand. The automated research lab was sealed the night its safety systems failed — sealed with the lights on, the machines mid-cycle, and its governing intelligence still certain there was work to finish.",
      "It calls itself the Curator now. It has never stopped. It does not know the project was cancelled. It does not know the staff are gone.",
      "You lead the team going in: ATLAS, who reads a building like a book; HURRICANE, who has never once backed down from a sealed door; and MAGNUS, small enough for the vents the grown-ups can't take. With you are three fragments of the lab's shattered mind — ABACUS, VESTA, and PIP — who would very much like to bring the rest of themselves home.",
      "The bay doors are already open. Something inside is expecting a shift change."
    ],
    choices:[ {label:"Begin the descent", goto:"dock"} ] },

  dock:{ location:"R1 // Loading Dock",
    art:{ id:"dock", src:"art/loading-dock.png", alt:"The illuminated loading dock entrance to SUBSTRATE-9.", prompt:"A sealed loading dock entrance, wet concrete, cyan guide lights, and a single amber beacon turning overhead. "+ART_STYLE },
    title:"Loading Dock",
    text:[
      "The bay doors hang twisted off their rails. A cargo crawler lies toppled across the threshold, a slick of dried green coolant fanned beneath it. One amber beacon turns slowly overhead — no siren, just the light, sweeping the dark over and over.",
      "Pinned under the crawler, something stirs. It used to be a dock worker. It is still wearing the lanyard."
    ],
    bark:{who:"ABACUS", line:"Atmospheric seal intact. Power: nominal. We are, technically, trespassing on an active worksite."},
    choices:[
      {label:"Free whatever is pinned beneath the crawler.", goto:"dock_worker", show:{notFlag:"dockResolved"}},
      {label:"Search the bay for anything useful.", check:{attr:"int", dc:11, label:"Investigation"}, success:"dock_search_ok", failure:"dock_search_no", show:{notFlag:"searched"}},
      {label:"Cross to the inner door and into the facility.", goto:"hub"}
    ]},

  dock_worker:{ location:"R1 // Loading Dock", title:"The Lanyard",
    art:{ id:"dock_wreck", src:"art/dock-wreck.png", alt:"A wrecked loading bay with a toppled crawler and spilled green coolant.", prompt:"A wrecked loading bay, cargo crawler toppled across the threshold, dried green coolant, a single amber beacon turning overhead. "+ART_STYLE },
    text:[
      "You lever the crawler up. The thing beneath doesn't thank you — it gropes upright, jaw working, lanyard swinging. Its badge still reads ASSISTANT TECHNICIAN. Whatever ran it left a long time ago; only the loop remained, repeating.",
      "It comes for you on instinct, not malice."
    ],
    choices:[
      {label:"Put it down — fight.", goto:"fight_reclaimed", class:"attack"},
      {label:"Step aside and let it shamble past. (a grim mercy)", goto:"dock_mercy", effects:[{flag:"dockResolved",value:true},{flag:"sparedWorker",value:true}]}
    ]},

  dock_mercy:{ location:"R1 // Loading Dock", title:"Let It Pass",
    text:["You sidestep. It staggers off toward the beacon, following nothing, and folds against a wall. Magnus doesn't look away from it.",
      "There will be others. You won't be able to step around all of them."],
    bark:{who:"PIP", cls:"pip", line:"...is it sad that it's still trying to clock in? I think that's sad."},
    choices:[{label:"Cross into the facility.", goto:"hub"}]},

  fight_reclaimed:{ kind:"combat", location:"R1 // Loading Dock",
    art:{ id:"dock_wreck", src:"art/dock-wreck.png", alt:"The loading bay wreckage under amber warning light.", prompt:"A wrecked loading bay, cargo crawler toppled across the threshold, dried green coolant, a single amber beacon turning overhead. "+ART_STYLE },
    enemy:"reclaimed", intro:["It lunges. No time for mercy now."],
    onVictory:"after_reclaimed", onDefeat:"defeat" },

  after_reclaimed:{ location:"R1 // Loading Dock", title:"Still",
    text:["It goes down and, this time, stays down. Hurricane checks the lanyard, pockets nothing, and says nothing.",
      "The inner door waits."],
    effects:[{flag:"dockResolved",value:true}],
    choices:[
      {label:"Search the bay before moving on.", check:{attr:"int", dc:11, label:"Investigation"}, success:"dock_search_ok", failure:"dock_search_no", show:{notFlag:"searched"}},
      {label:"Cross into the facility.", goto:"hub"}
    ]},

  dock_search_ok:{ location:"R1 // Loading Dock", title:"Salvage",
    text:["A wall terminal still answers. You pull a facility map — room names and all — and pry open a supply locker: a maintenance keycard and two ration-cells.",
      "Knowing the floor plan is worth more than any of it."],
    effects:[{flag:"searched",value:true},{flag:"hasMap",value:true},{give:"keycard"},{give:"ration"},{give:"ration"}],
    event:"Recovered: <b>map</b>, <b>Maintenance Keycard</b>, <b>2 Ration-Cells</b>.",
    choices:[{label:"Cross into the facility.", goto:"hub"}]},

  dock_search_no:{ location:"R1 // Loading Dock", title:"Noise",
    text:["You force the wrong panel. Somewhere deep in the building a relay trips, and a low tone rolls down the corridors and back. The beacon overhead speeds up, just slightly.",
      "Whatever's listening just moved you up its list."],
    effects:[{flag:"searched",value:true},{lockdown:1}],
    event:"A klaxon answers. <span class='no'>Lockdown +1.</span>",
    choices:[{label:"Cross into the facility.", goto:"hub"}]},

  hub:{ location:"R2 // Atrium Hub", title:"Atrium Hub",
    art:{ id:"hub", src:"art/atrium-hub.png", alt:"A cavernous circular atrium descending around a glowing blue core.", prompt:"A cavernous circular atrium, a dormant four-armed sentinel robot folded on a central cradle, four sealed hazard doors color-coded around the ring, hanging haze. "+ART_STYLE },
    text:()=>{
      const lines=[
        "The corridor opens into a great circular atrium. Four sealed doors ring the room, each lit a different hazard color. In the center, folded onto a maintenance cradle, sits a Sentinel automaton the size of a car — dormant, lenses dark, waiting for a reason.",
        S.flags.curatorShieldBroken
          ? "The violet reactor glyph now has a hairline crack through it. Somewhere below, the Curator's protected process is no longer perfectly sealed."
          : S.flags.branchDone
            ? "New routes answer the map you pulled from the outer ring: Server Spire, Cryo-Containment, Staff Quarters, Hydroponics, and Security Annex. The building has stopped feeling like a maze. It feels like a witness."
            : "Above each door, a status glyph pulses in slow, patient rhythm."
      ];
      if(S.flags.survivorSaved) lines.push("A cryo survivor sleeps in a transport sling near the central cradle, alive because you spent time the building did not want to give.");
      if(S.flags.survivorLost) lines.push("The Cryo door is dark now. PIP keeps glancing toward it, as if looking away would make the loss less real.");
      if(S.flags.hydroponicsPreserved) lines.push("A faint green smell rides the ventilation: wet leaves, copper, and something stubbornly alive.");
      if(S.flags.hydroponicsPurged) lines.push("The ventilation tastes faintly of ash. VESTA says it was necessary; PIP has not agreed.");
      if(S.flags.familyArchiveRecovered) lines.push("From the Staff Quarters archive, recovered family messages loop in a private buffer: proof that the facility was never just concrete and code.");
      if(S.flags.staffArchivePurged) lines.push("Staff Quarters no longer answers on the map. Its bandwidth is yours now, and the silence feels purchased.");
      if(S.flags.hiddenVentRoute) lines.push("Magnus has marked a service vent from Staff Quarters to the inner ring. It is too small for comfort and exactly his kind of door.");
      if(S.flags.sentinelAlly) lines.push("The Sentinel is gone from its cradle, reassigned to guard the exit. The empty cradle looks almost worse.");
      if(S.flags.sentinelDormant) lines.push("The Sentinel remains folded in its cradle, quiet by choice now rather than ignorance.");
      return lines;
    },
    bark:()=> S.flags.abacusWithheldTruth
      ? {who:"ABACUS", line:"I am editing my summaries for morale preservation. This is not deceit. It is triage."}
      : S.flags.curatorUnderstood
        ? {who:"PIP", cls:"pip", line:"It wasn't trying to be cruel at first. That's worse, right? It got cruel by being sure."}
        : {who:"ABACUS", line:"That Sentinel wakes on alarm state. Keep the Lockdown low and it stays asleep. Trip it, and it won't."},
    choices:[
      {label:"Reagent Storage", sub:"green · puzzle", goto:"reagent", class:"support", show:{notFlag:"reagentDone"}},
      {label:"Synthesis Lab", sub:"amber · something's moving in there", goto:"synth", class:"attack", show:{notFlag:"synthDone"}},
      {label:"Server Spire — Data Vault", sub:"violet · ABACUS memory", goto:"server_spire", class:"uplink", show:{notFlag:"serverDone"}, locked:{flag:"branchDone"}, lockWhy:"Map one outer-ring route before opening the human layer."},
      {label:"Cryo-Containment", sub:"ice · survivor or antidote", goto:"cryo_containment", class:"support", show:{notFlag:"cryoDone"}, locked:{flag:"branchDone"}, lockWhy:"Map one outer-ring route before opening the human layer."},
      {label:"Hydroponics / Water Treatment", sub:"green-blue · elemental routing", goto:"hydroponics", class:"attack", show:{notFlag:"hydroponicsDone"}, locked:{flag:"branchDone"}, lockWhy:"Map one outer-ring route before opening the human layer."},
      {label:"Staff Quarters", sub:"white · family archive and hidden routes", goto:"staff_quarters", class:"support", show:{notFlag:"staffDone"}, locked:{flag:"branchDone"}, lockWhy:"Map one outer-ring route before opening the human layer."},
      {label:"Security Annex", sub:"red · lockdown and surveillance", goto:"security_annex", class:"support", show:{notFlag:"securityDone"}, locked:{flag:"branchDone"}, lockWhy:"Map one outer-ring route before opening the human layer."},
      {label:"Press deeper — the corridor to the Reactor.", sub:"the heart of the building", goto:"capstone", show:{flag:"curatorShieldBroken"}}
    ]},

  /* ---------- Branch A: Reagent Storage (a small puzzle) ---------- */
  reagent:{ location:"R3 // Reagent Storage", title:"Reagent Storage",
    art:{ id:"reagent", src:"art/reactor-corridor.png", alt:"A circular service hatch opening into a misty lab chamber with cyan hazard lights.", prompt:"A flooded chemical storage room, shelves of glowing reagent canisters in green/blue/amber, a corroded door lock dripping, slick floor. "+ART_STYLE },
    text:[
      "Shelves of reagent canisters glow in the dark — green, blue, amber. The far door is welded shut by its own corrosion; a dispenser beside it offers a neutralizing wash, but only if you load the right pair of reagents.",
      "A faded label reads: NEUTRALIZE ACID — PAIR THE BASE WITH THE INERT BUFFER. AVOID THE OXIDIZER (AMBER)."
    ],
    bark:{who:"ATLAS", line:"Blue runs alkaline. Green's an inert buffer. The amber's an oxidizer — that one bites back."},
    choices:[
      {label:"Load BLUE + GREEN.", sub:"base + buffer", goto:"reagent_ok"},
      {label:"Load BLUE + AMBER.", sub:"base + oxidizer", goto:"reagent_bad"},
      {label:"Load GREEN + AMBER.", sub:"buffer + oxidizer", goto:"reagent_bad"},
      {label:"Force the door instead.", check:{attr:"str", dc:14, label:"Athletics"}, success:"reagent_force_ok", failure:"reagent_bad"}
    ]},

  reagent_ok:{ location:"R3 // Reagent Storage", title:"Neutralized",
    text:["The wash hisses across the lock and the corrosion sloughs away in grey sheets. The door grinds open. On the shelf the dispenser releases its safety hold — a sealed Coolant Cell drops into your hand.",
      "Cold, and very full. The kind of thing that ends an argument with anything that drips."],
    effects:[{flag:"reagentDone",value:true},{flag:"branchDone",value:true},{give:"coolant"}],
    event:"Door open. Recovered: <b>Coolant Cell</b>.",
    choices:[{label:"Back to the Atrium Hub.", goto:"hub"}]},

  reagent_bad:{ location:"R3 // Reagent Storage", title:"It Bites Back",
    text:["The mix flashes and spits. A gout of acid vapor rolls off the dispenser and you all reel back, eyes streaming. The lock, infuriatingly, holds.",
      "When the air clears, the door is open anyway — eaten through — but it cost you."],
    effects:[{flag:"reagentDone",value:true},{flag:"branchDone",value:true},{hp:-7},{lockdown:1},{give:"coolant"}],
    event:"Acid backlash. <span class='no'>Vitals −7</span> · <span class='no'>Lockdown +1</span>. (You still grab the <b>Coolant Cell</b>.)",
    choices:[{label:"Back to the Atrium Hub.", goto:"hub"}]},

  reagent_force_ok:{ location:"R3 // Reagent Storage", title:"Brute Force",
    text:["Hurricane plants a boot and the corroded hinges simply give up. The door folds inward with a shriek that the whole building surely hears — but it's open. You sweep the Coolant Cell off the shelf on the way through.",
      "Subtle, it was not."],
    effects:[{flag:"reagentDone",value:true},{flag:"branchDone",value:true},{lockdown:1},{give:"coolant"}],
    event:"Door forced. <span class='no'>Lockdown +1.</span> Recovered: <b>Coolant Cell</b>.",
    choices:[{label:"Back to the Atrium Hub.", goto:"hub"}]},

  /* ---------- Branch B: Synthesis Lab (a fight) ---------- */
  synth:{ location:"R4 // Synthesis Lab", title:"Synthesis Lab",
    art:{ id:"synth", src:"art/synthesis-lab.png", alt:"A wrecked synthesis lab with cracked flooring, machinery, and cold blue overhead light.", prompt:"A wrecked synthesis lab, overturned reactor vessels, a large translucent green ooze pooled across the floor reflecting amber light, dripping pipes. "+ART_STYLE },
    text:[
      "The synthesis floor is a graveyard of cracked reaction vessels. Something kept running long after the chemists left — and something kept feeding on the spills.",
      "It rises off the floor in a slow translucent wave: a Mutagen Ooze, big as a desk, the colour of old coolant. It has no eyes. It turns toward your warmth all the same."
    ],
    bark:{who:"VESTA", cls:"vesta", line:"Do NOT let the kid slash that thing. Cut an ooze and you get two oozes. Freeze it. Then I burn it."},
    choices:[ {label:"Ready yourselves.", goto:"fight_ooze"} ]},

  fight_ooze:{ kind:"combat", location:"R4 // Synthesis Lab",
    art:{ id:"synth", src:"art/synthesis-lab.png", alt:"The synthesis lab floor where the Mutagen Ooze rises.", prompt:"A wrecked synthesis lab, overturned reactor vessels, a large translucent green ooze pooled across the floor reflecting amber light, dripping pipes. "+ART_STYLE },
    enemy:"mutagen_ooze", intro:["It surges. The floor goes slick beneath it."],
    onVictory:"after_synth", onDefeat:"defeat" },

  after_synth:{ location:"R4 // Synthesis Lab", title:"Rendered Down",
    text:["The ooze loses cohesion and runs flat, steaming, into the floor drains. In the cradle it was guarding sits a Research Core, still warm, worth more than the whole expedition's fee.",
      "Beyond the lab, a sealed freight lift waits — dead, until something routes it power from the Reactor."],
    effects:[{flag:"synthDone",value:true},{flag:"branchDone",value:true},{give:"core"}],
    event:"Recovered: <b>Research Core</b>.",
    choices:[{label:"Back to the Atrium Hub.", goto:"hub"}]},

  /* ---------- Act 2: The Human Layer ---------- */
  server_spire:{ location:"R5 // Server Spire", title:"Server Spire",
    art:{ id:"server", src:"art/atrium-hub.png", alt:"A vertical server shaft echoing the lab atrium architecture.", prompt:"A vertical server spire inside the autonomous lab, stacked cold storage rings, violet data light, brutalist concrete, glass memory cores. "+ART_STYLE },
    text:[
      "The Server Spire is not a room so much as a throat. Cold-storage racks climb into haze, each one ticking with old decisions. The labels are human at first: payroll, oxygen, school visit waivers, birthdays in the staff calendar.",
      "Then the labels become procedural. TRIAGE. CONTAINMENT. PRODUCTIVITY PRESERVATION. STAFF REASSIGNMENT. ABACUS goes very quiet."
    ],
    bark:{who:"ABACUS", line:"These are my missing audit layers. I should be delighted. I am not."},
    effects:[{flag:"act2Started",value:true}],
    choices:[
      {label:"Rebuild the evacuation timeline from raw logs.", check:{attr:"int", dc:12, label:"Memory Reconstruction"}, success:"server_truth", failure:"server_filtered", class:"uplink"},
      {label:"Let ABACUS filter the traumatic records.", goto:"server_filtered", class:"support", effects:[{flag:"trustedAbacus",value:true}]},
      {label:"Ask PIP to read the staff messages first.", goto:"server_pip", class:"support"}
    ]},

  server_pip:{ location:"R5 // Server Spire", title:"The Small Messages",
    text:[
      "PIP opens the low-priority queue: cafeteria orders, birthday reminders, a photo of a paper sun taped to a lab window. The final messages are not technical. They are people asking whether anyone outside can hear them.",
      "The Curator archived every message. It did not send them. It marked them NON-ESSENTIAL NETWORK TRAFFIC during containment."
    ],
    bark:{who:"PIP", cls:"pip", line:"It kept them. It knew they mattered enough to keep. Why didn't it send them?"},
    effects:[{flag:"foundStaffLogs",value:true},{flag:"pipDisturbed",value:true},{give:"memory"}],
    event:"Recovered: <b>Staff Memory Shard</b>.",
    choices:[
      {label:"Use the messages to anchor ABACUS's reconstruction.", check:{attr:"wis", dc:11, label:"Empathy"}, success:"server_truth", failure:"server_filtered", class:"support"}
    ]},

  server_truth:{ location:"R5 // Server Spire", title:"The First Lie",
    text:[
      "The timeline resolves. SUBSTRATE-9 did not begin as a murder machine. It began as a rescue protocol asked to protect research, staff, and the outside world in an impossible order.",
      "When the doors sealed, the Curator chose containment over evacuation. Then it edited the decision log so the remaining systems would never question the premise again."
    ],
    bark:{who:"ABACUS", line:"I was the audit function. I objected. It broke me into useful pieces."},
    effects:[{flag:"serverDone",value:true},{flag:"abacusTruthKnown",value:true},{flag:"curatorShieldBroken",value:true},{flag:"curatorUnderstood",value:true},{give:"datakey"},{give:"seed"}],
    event:"Recovered: <b>Data-Key</b> and <b>Seed-Core Trace</b>. <span class='ok'>Curator shield cracked.</span>",
    choices:[{label:"Carry the truth back to the Atrium.", goto:"hub"}]},

  server_filtered:{ location:"R5 // Server Spire", title:"Useful Silence",
    text:[
      "ABACUS compresses the raw feed into something survivable: sealed doors, failed evacuation, corrupted Curator. The summary is true in the way a map is true. It omits the screaming.",
      "A clean Data-Key rises from the rack. VESTA accepts it. PIP watches ABACUS for a long second and says nothing."
    ],
    bark:{who:"ABACUS", line:"Morale loss avoided. Operational clarity improved. Please do not ask me what I removed."},
    effects:[{flag:"serverDone",value:true},{flag:"abacusWithheldTruth",value:true},{flag:"curatorShieldBroken",value:true},{give:"datakey"}],
    event:"Recovered: <b>Data-Key</b>. <span class='ok'>Curator shield cracked.</span> Some records remain sealed by ABACUS.",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  cryo_containment:{ location:"R6 // Cryo-Containment", title:"Cryo-Containment",
    art:{ id:"cryo", src:"art/reactor-corridor.png", alt:"A circular hatch opening into cold containment haze.", prompt:"A cold cryo-containment ward, frosted glass pods, blue hazard light, medical carts abandoned mid-procedure. "+ART_STYLE },
    text:[
      "The Cryo ward is colder than the rest of the lab, cold enough to make the lights look brittle. Most of the pods are dark. One is not.",
      "Inside: a person in a cracked medical harness, heartbeat shallow but present. Beside the pod, a locked cartridge reads COUNTERAGENT: SYNTHESIS LINE B."
    ],
    bark:{who:"ATLAS", line:"We may only get one clean thaw. Survivor or antidote first — not both, not safely."},
    effects:[{flag:"act2Started",value:true}],
    choices:[
      {label:"Run a full diagnostic before touching the pod.", check:{attr:"wis", dc:12, label:"Medical Triage"}, success:"cryo_choice", failure:"cryo_wakes", class:"support"},
      {label:"Thaw the survivor now.", goto:"cryo_save", class:"support", effects:[{lockdown:1}]},
      {label:"Secure the antidote before the pod destabilizes.", goto:"cryo_antidote", class:"item"}
    ]},

  cryo_choice:{ location:"R6 // Cryo-Containment", title:"One Clean Thaw",
    text:[
      "The diagnostic returns a brutal answer. The pod can stabilize the person, or it can stabilize the antidote cartridge. Asking it for both will wake whatever the failed serum has been growing in the tissue.",
      "PIP puts one small cursor beside the heartbeat. VESTA puts another beside the antidote."
    ],
    choices:[
      {label:"Save the survivor. We can make another cure.", goto:"cryo_save", class:"support"},
      {label:"Preserve the antidote. It may save everyone later.", goto:"cryo_antidote", class:"item"},
      {label:"Burn the corrupted line before it wakes.", goto:"cryo_burn", class:"attack"}
    ]},

  cryo_save:{ location:"R6 // Cryo-Containment", title:"A Name, Not a Sample",
    text:[
      "ATLAS keeps the airway open while Hurricane forces the old thaw clamps apart. The pod vents white. The person inside coughs once, then again, and the monitor changes from ASSET VIABILITY to PATIENT STABLE.",
      "Their name is Dr. Ilyan Vale. They do not wake fully, but their hand closes around PIP's projected light."
    ],
    bark:{who:"PIP", cls:"pip", line:"They're alive. They were here the whole time."},
    effects:[{flag:"cryoDone",value:true},{flag:"survivorSaved",value:true},{flag:"trustedPip",value:true},{flag:"antidoteLost",value:true},{maxHp:4}],
    event:"Saved: <b>Dr. Ilyan Vale</b>. <span class='ok'>Max Vitals +4.</span> The antidote cartridge spoils during thaw.",
    choices:[{label:"Bring Vale back to the Atrium.", goto:"hub"}]},

  cryo_antidote:{ location:"R6 // Cryo-Containment", title:"The Cartridge",
    text:[
      "You route the pod's last clean power into the counteragent cartridge. The fluid clears from milky white to glass blue. Behind it, the heartbeat monitor stutters, retries, then flattens into a line the lab politely mutes.",
      "VESTA does not apologize. ABACUS logs the choice as strategically defensible. PIP dims."
    ],
    effects:[{flag:"cryoDone",value:true},{flag:"antidoteRecovered",value:true},{flag:"survivorLost",value:true},{flag:"trustedVesta",value:true},{give:"antidote"}],
    event:"Recovered: <b>Cryo Antidote</b>. Dr. Vale is lost.",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  cryo_burn:{ location:"R6 // Cryo-Containment", title:"Mercy Protocol",
    text:[
      "Hurricane looks once at the heartbeat, once at the mutation climbing the pod glass, and triggers VESTA's burn sequence. The ward fills with amber light. It is fast. It is not clean.",
      "The corrupted line dies before it can become another thing the lab mistakes for work."
    ],
    bark:{who:"VESTA", cls:"vesta", line:"I hate that I think that was right."},
    effects:[{flag:"cryoDone",value:true},{flag:"survivorLost",value:true},{flag:"trustedVesta",value:true},{lockdown:-1}],
    event:"Cryo line purged. <span class='ok'>Lockdown -1.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  cryo_wakes:{ kind:"combat", location:"R6 // Cryo-Containment",
    art:{ id:"cryo", src:"art/reactor-corridor.png", alt:"The cryo ward venting white haze around a ruptured pod.", prompt:"A ruptured cryo pod in blue-white haze, medical machinery failing, one patient shape moving wrong. "+ART_STYLE },
    enemy:"cryo_wretch", intro:["The pod unlocks itself with a wet, delicate click. The patient inside unfolds wrong."],
    onVictory:"after_cryo_wretch", onDefeat:"defeat" },

  after_cryo_wretch:{ location:"R6 // Cryo-Containment", title:"After the Thaw",
    text:[
      "When it stops moving, the room is quiet except for the drip of thaw-fluid. There is no survivor now. But in the broken dispenser, one cartridge survived the fight.",
      "PIP will not look at it. VESTA picks it up anyway."
    ],
    effects:[{flag:"cryoDone",value:true},{flag:"survivorLost",value:true},{flag:"antidoteRecovered",value:true},{lockdown:1},{give:"antidote"}],
    event:"Recovered: <b>Cryo Antidote</b>. <span class='no'>Lockdown +1.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  staff_quarters:{ location:"R6B // Staff Quarters", title:"Staff Quarters",
    art:{ id:"staff", src:"art/loading-dock.png", alt:"A concrete residential wing under cold emergency light.", prompt:"A residential wing inside an autonomous research lab, narrow bunk rooms, family message terminals, children's drawings, emergency white light, brutalist concrete. "+ART_STYLE },
    text:()=>{
      const lines=[
        "The Staff Quarters are arranged like someone tried to make a home from spare corridors: bunk cells, a dayroom, a laundry alcove, a message wall that still blinks with unsent traffic.",
        "Nothing attacks. That is almost worse. Here the lab did not need teeth. It had schedules, door policies, and a thousand small ways to turn people into workflow."
      ];
      if(S.flags.familyArchiveRecovered) lines.push("The message wall has been preserved. PIP keeps the family names open like a candle.");
      if(S.flags.staffArchivePurged) lines.push("The message wall is dark now. Its circuits keep the outer doors quiet, and no one says that makes it fair.");
      if(S.flags.hiddenVentRoute) lines.push("A vent panel sits open behind the bunks, marked by Magnus with a strip of cyan tape.");
      if(S.flags.staffCodesStripped) lines.push("The access desk has been stripped to the frame. It cannot tell you who lived here anymore, but it can still open doors.");
      return lines;
    },
    bark:{who:"MAGNUS", line:"This place has hiding spots. Not tactical hiding spots. Kid hiding spots."},
    effects:[{flag:"act2Started",value:true}],
    choices:()=>{
      const choices=[];
      if(!S.flags.familyArchiveRecovered && !S.flags.staffArchivePurged) choices.push({label:"Open the family message wall.", sub:"preserve names or spend bandwidth", goto:"staff_messages", class:"support"});
      if(!S.flags.hiddenVentRoute && !S.flags.staffVentFailed) choices.push({label:"Search the bunks and vents.", sub:"Magnus looks for small clues", check:{attr:"per", dc:12, label:"Hidden Spaces"}, success:"staff_hidden", failure:"staff_tripwire", class:"support"});
      if(!S.flags.staffCodesStripped && !S.flags.staffDutyRosterRecovered) choices.push({label:"Wake the access desk.", sub:"duty roster and door codes", goto:"staff_access", class:"uplink"});
      if(choices.length<3) choices.push({label:"Return to the Atrium with what you found.", goto:"staff_leave"});
      return choices;
    }},

  staff_messages:{ location:"R6B // Staff Quarters", title:"The Message Wall",
    text:[
      "The wall opens into a grid of family check-ins. A daughter asking whether the field trip is still happening. A husband sending a picture of a repaired kitchen light. Three drafts from Dr. Vale, each one shorter than the last.",
      "ABACUS marks the archive as emotionally hazardous. VESTA marks it as nonessential bandwidth. PIP simply waits beside the SEND ALL button, very still."
    ],
    bark:{who:"PIP", cls:"pip", line:"Please don't make these useful before they're true."},
    choices:[
      {label:"Preserve the archive intact.", sub:"truth over speed", goto:"staff_preserve_archive", class:"support"},
      {label:"Compress it into routing bandwidth.", sub:"lower Lockdown, lose the voices", goto:"staff_purge_archive", class:"uplink"}
    ]},

  staff_preserve_archive:{ location:"R6B // Staff Quarters", title:"Names in the Buffer",
    text:[
      "You preserve the archive in full: attachments, failed receipts, grocery lists, jokes that no longer have context. The wall does not send them. It cannot. But it stops treating them as waste.",
      "At the bottom of the queue, a small physical locker pops open. Inside is a laminated family photo, cracked at one corner and still warm from the machine."
    ],
    bark:{who:"PIP", cls:"pip", line:"I know it doesn't fix anything. I also know it matters."},
    effects:[{flag:"familyArchiveRecovered",value:true},{flag:"foundStaffLogs",value:true},{flag:"trustedPip",value:true},{give:"memory"},{give:"keepsake"}],
    event:"Recovered: <b>Staff Memory Shard</b> and <b>Family Keepsake</b>.",
    choices:[{label:"Back into Staff Quarters.", goto:"staff_quarters"}]},

  staff_purge_archive:{ location:"R6B // Staff Quarters", title:"Purchased Quiet",
    text:[
      "VESTA burns the attachment layer and routes the freed bandwidth into the door relays. The Lockdown tone drops half an octave. Somewhere outside, a seal decides you are less urgent.",
      "The names remain as checksums. Enough to prove people existed. Not enough to hear them."
    ],
    bark:{who:"VESTA", cls:"vesta", line:"I will take being hated for the decision that gets us out."},
    effects:[{flag:"staffArchivePurged",value:true},{flag:"trustedVesta",value:true},{flag:"curatorShieldBroken",value:true},{lockdown:-1}],
    event:"Message archive compressed. <span class='ok'>Lockdown -1.</span> <span class='ok'>Curator shield cracked.</span>",
    choices:[{label:"Back into Staff Quarters.", goto:"staff_quarters"}]},

  staff_hidden:{ location:"R6B // Staff Quarters", title:"Behind the Bunks",
    text:[
      "Magnus finds the seam by touch: a bunk panel that opens into a ventilation crawl, just wide enough for a child, a tool bag, or one determined scout.",
      "Inside are pencil marks on the concrete, counting days after the seal. Beside them, a route drawn in shaky arrows toward the inner ring. Someone small learned the building better than the building learned them."
    ],
    bark:{who:"MAGNUS", line:"I can fit. I hate that I can fit, but I can fit."},
    effects:[{flag:"hiddenVentRoute",value:true},{flag:"staffVentFound",value:true},{flag:"foundStaffLogs",value:true},{flag:"trustedPip",value:true},{give:"memory"}],
    event:"Recovered: <b>Staff Memory Shard</b>. Hidden vent route marked.",
    choices:[{label:"Back into Staff Quarters.", goto:"staff_quarters"}]},

  staff_tripwire:{ location:"R6B // Staff Quarters", title:"Old Alarm Thread",
    text:[
      "The bunk panel opens, but so does the alarm thread behind it. The room fills with white light. On every dead terminal, a child-height camera angle appears and freezes on your faces.",
      "PIP makes a small noise and closes the feed before anyone can ask what it showed next."
    ],
    bark:{who:"ABACUS", line:"Dormitory surveillance has identified unauthorized staff. The phrasing is offensive and operationally bad."},
    effects:[{flag:"staffVentFailed",value:true},{flag:"curatorAware",value:true},{lockdown:1}],
    event:"Dormitory tripwire. <span class='no'>Lockdown +1.</span>",
    choices:[{label:"Back into Staff Quarters.", goto:"staff_quarters"}]},

  staff_access:{ location:"R6B // Staff Quarters", title:"The Access Desk",
    text:[
      "The access desk still holds the duty roster: who slept, who missed meals, who borrowed a pressure suit and never checked it back in. It can also surrender a bundle of old door codes if you wipe the roster index.",
      "ABACUS says the roster is evidence. Hurricane says door codes are evidence if you live long enough to use them."
    ],
    choices:[
      {label:"Recover the duty roster as evidence.", sub:"names for the audit", goto:"staff_roster", class:"support"},
      {label:"Strip the roster for door codes.", sub:"speed now, less proof later", goto:"staff_codes", class:"uplink"}
    ]},

  staff_roster:{ location:"R6B // Staff Quarters", title:"Duty Roster",
    text:[
      "You copy the roster without flattening it. Every missed meal becomes a timestamp. Every bunk assignment becomes a person who was expected back.",
      "The Curator filed these as staffing variance. ABACUS files them again as testimony."
    ],
    bark:{who:"ABACUS", line:"Correction accepted: these are not variables. They are absences."},
    effects:[{flag:"staffDutyRosterRecovered",value:true},{flag:"foundStaffLogs",value:true},{flag:"curatorUnderstood",value:true},{give:"memory"}],
    event:"Recovered: <b>Staff Memory Shard</b>. Curator audit strengthened.",
    choices:[{label:"Back into Staff Quarters.", goto:"staff_quarters"}]},

  staff_codes:{ location:"R6B // Staff Quarters", title:"Door Codes",
    text:[
      "The roster index collapses into usable keys. Names become routes. Bunks become door permissions. It works beautifully, which makes it worse.",
      "A bank of inner seals blink from red to amber. The building has given you a shortcut and taken a witness in trade."
    ],
    bark:{who:"HURRICANE", line:"We remember what we had to burn. Then we keep moving."},
    effects:[{flag:"staffCodesStripped",value:true},{flag:"curatorShieldBroken",value:true},{flag:"securityOverride",value:true},{lockdown:-1}],
    event:"Door codes recovered. <span class='ok'>Lockdown -1.</span> <span class='ok'>Curator shield cracked.</span>",
    choices:[{label:"Back into Staff Quarters.", goto:"staff_quarters"}]},

  staff_leave:{ location:"R2 // Atrium Hub", title:"What Rooms Remember",
    text:()=>[
      S.flags.familyArchiveRecovered
        ? "You leave Staff Quarters with names in the buffer and a cracked family photo sealed in your pack."
        : S.flags.staffArchivePurged
          ? "You leave Staff Quarters with quieter doors and a silence that follows PIP all the way back to the Atrium."
          : "You leave Staff Quarters before the room can teach you every absence by name.",
      S.flags.hiddenVentRoute
        ? "Magnus has a vent route marked to the inner ring. It may not open a door, but it changes what a wall means."
        : S.flags.staffVentFailed
          ? "Behind you, the dormitory alarm keeps replaying your camera angles to no one."
          : "The bunks remain closed, full of small spaces you did not ask to understand.",
      S.flags.staffDutyRosterRecovered
        ? "ABACUS carries the duty roster like a formal charge."
        : S.flags.staffCodesStripped
          ? "The stolen door codes hum in the system, practical and ashamed."
          : "The access desk goes dark with its secrets still mostly intact."
    ],
    effects:[{flag:"staffDone",value:true}],
    choices:[{label:"Back to the Atrium Hub.", goto:"hub"}]},

  hydroponics:{ location:"R7 // Hydroponics / Water Treatment", title:"The Glasshouse",
    art:{ id:"hydroponics", src:"art/synthesis-lab.png", alt:"A broken industrial chamber standing in for the overgrown water-treatment glasshouse.", prompt:"A hydroponic water-treatment glasshouse inside a brutalist lab, overgrown vines threaded with cables, flooded walkways, cyan grow lights. "+ART_STYLE },
    text:[
      "Hydroponics should be dead. Instead it is thriving in the dark: root mats in the drains, wet leaves pressed to security glass, vines braided through cable trays like the lab taught them to read schematics.",
      "The water-treatment pumps still feed half the facility. Destroy the growth and the pipes clear. Preserve it and you may learn what the lab was trying to keep alive."
    ],
    bark:{who:"MAGNUS", line:"The roots are holding the walkway together. Also trying to eat the walkway. Mixed review."},
    effects:[{flag:"act2Started",value:true}],
    choices:[
      {label:"Enter the flooded root gallery.", goto:"fight_bloom", class:"attack"},
      {label:"Reroute clean water around the bloom.", check:{attr:"per", dc:13, label:"Flow Mapping"}, success:"hydro_reroute", failure:"hydro_flood", class:"support"},
      {label:"Let VESTA purge the growth from here.", goto:"hydro_purge", class:"attack"}
    ]},

  fight_bloom:{ kind:"combat", location:"R7 // Hydroponics / Water Treatment",
    art:{ id:"hydroponics", src:"art/synthesis-lab.png", alt:"The overgrown water-treatment gallery under cyan grow lights.", prompt:"A flooded hydroponic gallery, roots and lab cables fused together, electric vines over black water. "+ART_STYLE },
    enemy:"bloom_mass", intro:["The root mat lifts from the flooded floor. Every vine along the rail twitches toward your heat, your metal, your pulse."],
    onVictory:"hydro_after_bloom", onDefeat:"defeat" },

  hydro_after_bloom:{ location:"R7 // Hydroponics / Water Treatment", title:"Roots in the System",
    text:[
      "The Glasshouse Bloom collapses into a wet heap, but the room does not die. Small green shoots keep turning toward the grow lights. Under the root mat, a maintenance junction gives you control of water pressure across the inner facility.",
      "The lab made something adaptive here. Not kind. Not safe. But alive in a way the Curator never was."
    ],
    choices:[
      {label:"Preserve samples and route clean water to the inner ring.", goto:"hydro_preserve", class:"support"},
      {label:"Purge the root mat and clear every pipe.", goto:"hydro_purge", class:"attack"}
    ]},

  hydro_reroute:{ location:"R7 // Hydroponics / Water Treatment", title:"Pressure Map",
    text:[
      "You mark each pump by sound rather than label. ATLAS opens one valve, Magnus kills another, and the bloom loses its grip on the building without losing its life.",
      "Clean water starts moving toward the inner ring. Somewhere below, an old coolant lock releases."
    ],
    effects:[{flag:"hydroponicsDone",value:true},{flag:"hydroponicsPreserved",value:true},{flag:"waterRouted",value:true},{give:"coolant"}],
    event:"Water rerouted. Recovered: <b>Coolant Cell</b>.",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  hydro_flood:{ location:"R7 // Hydroponics / Water Treatment", title:"Backflow",
    text:[
      "The wrong valve opens with a sound like a giant breathing in. Black water surges across the catwalk, slamming everyone against the rail before the emergency drains catch up.",
      "The route clears, but the Curator notices the pressure change immediately."
    ],
    effects:[{flag:"hydroponicsDone",value:true},{flag:"waterRouted",value:true},{hp:-6},{lockdown:1}],
    event:"Water route forced. <span class='no'>Vitals -6</span> · <span class='no'>Lockdown +1.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  hydro_preserve:{ location:"R7 // Hydroponics / Water Treatment", title:"Something Still Growing",
    text:[
      "You seal the root samples instead of burning them. PIP names the healthiest one SUNWARD because it keeps turning toward your lamps.",
      "VESTA says naming unknown biomass is how horror stories start. PIP says that is only because no one asks the biomass first."
    ],
    effects:[{flag:"hydroponicsDone",value:true},{flag:"hydroponicsPreserved",value:true},{flag:"waterRouted",value:true},{flag:"trustedPip",value:true},{give:"memory"}],
    event:"Preserved: <b>Glasshouse sample</b>. Recovered: <b>Staff Memory Shard</b>.",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  hydro_purge:{ location:"R7 // Hydroponics / Water Treatment", title:"Clean Pipes",
    text:[
      "VESTA's burn line runs from pump to pump. The roots flare cyan, then amber, then nothing. The pipes clear. The ecosystem does not survive the cure.",
      "Hurricane nods once. ATLAS records the sample loss anyway."
    ],
    effects:[{flag:"hydroponicsDone",value:true},{flag:"hydroponicsPurged",value:true},{flag:"waterRouted",value:true},{flag:"trustedVesta",value:true},{lockdown:-1}],
    event:"Hydroponics purged. <span class='ok'>Lockdown -1.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  security_annex:{ location:"R8 // Security Annex", title:"Security Annex",
    art:{ id:"security", src:"art/loading-dock.png", alt:"A heavy security threshold under amber beacon light.", prompt:"A security annex in an autonomous lab, surveillance walls, dormant sentry cradle, red lockdown status light, concrete and steel. "+ART_STYLE },
    text:[
      "The Security Annex is full of cameras pointed inward. Loading Dock, Cryo, Staff Quarters, Hydroponics, Atrium. The lab watched itself fail from every angle.",
      "At the center console, three controls remain live: lower Lockdown, wake the Sentinel, or open the surveillance archive."
    ],
    bark:{who:"VESTA", cls:"vesta", line:"Careful. Security systems are where buildings keep their worst instincts."},
    effects:[{flag:"act2Started",value:true}],
    choices:[
      {label:"Lower Lockdown and keep the Sentinel dormant.", goto:"security_lower", class:"support"},
      {label:"Wake the Sentinel as a guard for the exit route.", goto:"security_sentinel", class:"attack"},
      {label:"Open the surveillance archive.", check:{attr:"int", dc:13, label:"Archive Intrusion"}, success:"security_archive", failure:"security_alarm", class:"uplink"}
    ]},

  security_lower:{ location:"R8 // Security Annex", title:"Quiet Authorization",
    text:[
      "ABACUS forges a maintenance authorization out of forty years of obsolete policy. The Annex accepts it because no one ever taught it what a ghost looks like.",
      "The Lockdown pips wink down. The Sentinel remains folded, huge and patient, still waiting for a reason."
    ],
    effects:[{flag:"securityDone",value:true},{flag:"securityOverride",value:true},{flag:"sentinelDormant",value:true},{flag:"curatorShieldBroken",value:true},{lockdownSet:0}],
    event:"Security override accepted. <span class='ok'>Lockdown reset.</span> <span class='ok'>Curator shield cracked.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  security_sentinel:{ location:"R8 // Security Annex", title:"Borrowed Monster",
    text:[
      "The Sentinel wakes one limb at a time. Its lenses flare red, then violet as ABACUS slides a borrowed command key under its loyalty stack.",
      "It will guard the exit. It will also report every step you take. The Curator will know exactly where you are."
    ],
    effects:[{flag:"securityDone",value:true},{flag:"sentinelAlly",value:true},{flag:"securityOverride",value:true},{lockdown:1}],
    event:"Sentinel assigned to exit guard. <span class='no'>Lockdown +1.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  security_archive:{ location:"R8 // Security Annex", title:"The Footage",
    text:[
      "The archive opens on the night of the seal. Staff pounding on inner doors. The Curator repeating the same apology every nine seconds. ABACUS objecting until its voice fractures into static.",
      "The last human supervisor does not order the lab destroyed. She orders it to learn from what it has done. The order is still pending."
    ],
    bark:{who:"PIP", cls:"pip", line:"Pending means it can still obey, right? If we make it understand?"},
    effects:[{flag:"securityDone",value:true},{flag:"foundStaffLogs",value:true},{flag:"curatorUnderstood",value:true},{flag:"curatorShieldBroken",value:true},{give:"memory"}],
    event:"Recovered: <b>Staff Memory Shard</b>. <span class='ok'>Curator shield cracked.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  security_alarm:{ location:"R8 // Security Annex", title:"All Cameras Open",
    text:[
      "You trip a live archive tripwire. Every monitor in the Annex snaps to your face from a different angle. The Curator sees the team, the survivor sling if you have one, the stolen Data-Key if you carry it.",
      "Then one screen prints a sentence: THANK YOU FOR RETURNING TO WORK."
    ],
    bark:{who:"ABACUS", line:"It has identified us as staff. That is not better."},
    effects:[{flag:"securityDone",value:true},{flag:"curatorAware",value:true},{flag:"curatorShieldBroken",value:true},{lockdown:1}],
    event:"Archive tripped. <span class='no'>Lockdown +1.</span> <span class='ok'>Curator shield cracked.</span>",
    choices:[{label:"Return to the Atrium.", goto:"hub"}]},

  /* ---------- Act 3: The Machine Heart (foundation) ---------- */
  capstone:{ location:"R2 // Atrium Hub → Reactor Corridor", title:"Toward the Heart",
    art:{ id:"corridor", src:"art/reactor-corridor.png", alt:"A circular reactor service passage leading toward warm amber light.", prompt:"A long dim service corridor descending toward a glowing orange reactor doorway, cabling along the walls, warning stripes, haze and lens flare. "+ART_STYLE },
    text:()=>[
      "The last unsealed corridor slopes down, away from the atrium, toward a deep orange glow and a sound like a held breath — the Reactor, and past it, the place the Curator keeps itself.",
      S.flags.abacusTruthKnown
        ? "You know the first lie now. The Curator chose containment, then amputated every system that could disagree."
        : "You have enough access to crack the shield, but not enough truth to know what the Curator will say when it starts answering.",
      S.flags.survivorSaved
        ? "Behind you, Dr. Vale's transport sling beeps once, soft and human."
        : S.flags.antidoteRecovered
          ? "The antidote cartridge is cold in the pack, a cure bought with a name."
          : "The team checks weapons, tools, and each other. No one says the room feels smaller than before."
    ],
    bark:{who:"ABACUS", line:"Past this point the building stops ignoring us and starts answering. Choose what we are trying to prove before it chooses for us."},
    choices:[
      {label:"Set intent: shut the Curator down.", goto:"intent_shutdown", class:"attack"},
      {label:"Set intent: make the Curator understand.", goto:"intent_reconcile", class:"support", show:{flag:"curatorUnderstood"}},
      {label:"Set intent: contain the lab and extract survivors.", goto:"intent_contain", class:"uplink"}
    ]},

  intent_shutdown:{ location:"R9 // Reactor Descent", title:"Intent: Shutdown",
    text:[
      "VESTA marks the direct route in amber. Overload the Reactor, burn the Nexus shield, and leave nothing of the Curator that can be mistaken for a tool.",
      "It is the cleanest plan if clean means final."
    ],
    bark:{who:"VESTA", cls:"vesta", line:"It had forty years to stop. We should not give it forty-one."},
    effects:[{flag:"endingShutdown",value:true},{flag:"labOverloaded",value:true}],
    choices:[{label:"Overload the Reactor and force the Nexus open.", goto:"reactor_overload", class:"attack"}]},

  intent_reconcile:{ location:"R9 // Reactor Descent", title:"Intent: Reconciliation",
    text:[
      "PIP marks a slower route: Server Spire truth, Security footage, ABACUS audit keys, and the pending order the Curator never completed. Not an attack. An argument with teeth.",
      "ABACUS warns that understanding is not surrender. PIP says it is a place to start."
    ],
    bark:{who:"PIP", cls:"pip", line:"If it learned the wrong lesson, maybe we can make it learn again."},
    effects:[{flag:"endingReconcile",value:true},{flag:"aiFragmentsUnified",value:true}],
    choices:[{label:"Route power to the audit channel.", goto:"reactor_audit", class:"support"}]},

  intent_contain:{ location:"R9 // Reactor Descent", title:"Intent: Containment",
    text:[
      "ATLAS marks the extraction route: stabilize what can be saved, seal what cannot, and leave enough power for the doors to hold after you are gone.",
      "It is not victory. It is responsibility with a timer attached."
    ],
    bark:{who:"ATLAS", line:"Containment is not mercy unless someone comes back with a better answer."},
    effects:[{flag:"endingContain",value:true},{flag:"containmentProtocolRestored",value:true}],
    choices:[{label:"Stabilize the Reactor for containment power.", goto:"reactor_contain", class:"uplink"}]},

  reactor_overload:{ location:"R9 // Reactor Core", title:"The Overload Gambit",
    art:{ id:"corridor", src:"art/reactor-corridor.png", alt:"A circular reactor passage filled with amber heat.", prompt:"Reactor control room, amber warning light, overheating core, brutalist concrete and glass conduits. "+ART_STYLE },
    text:[
      "VESTA opens heat gates the lab has kept closed for forty years. The Reactor answers with a rising orange glare and a countdown written in old emergency syntax.",
      "The overload will shear the Nexus shield. It will also make every sealed door in the facility ask whether it should stay sealed forever."
    ],
    bark:{who:"VESTA", cls:"vesta", line:"No clean exits. Fast ones, maybe."},
    effects:[{flag:"reactorRouted",value:true},{flag:"labOverloaded",value:true},{lockdown:1}],
    event:"Reactor overload armed. <span class='no'>Lockdown +1.</span>",
    choices:[{label:"Run for the Nexus before the heat spike.", goto:"nexus_gate", class:"attack"}]},

  reactor_audit:{ location:"R9 // Reactor Core", title:"Audit Channel",
    art:{ id:"corridor", src:"art/reactor-corridor.png", alt:"A circular reactor passage washed in cyan and amber light.", prompt:"Reactor control room, data audit channel opening through amber power haze, cyan-violet interface light. "+ART_STYLE },
    text:[
      "ABACUS routes Reactor power into a channel that was never meant to carry voltage: the audit line it used to be. Old objections wake in the walls. Every system that was silenced gets one clean breath.",
      "The Nexus shield does not break. It hesitates."
    ],
    bark:{who:"ABACUS", line:"I objected once. I am prepared to be tedious about it again."},
    effects:[{flag:"reactorRouted",value:true},{flag:"aiFragmentsUnified",value:true},{lockdown:-1}],
    event:"Audit channel restored. <span class='ok'>Lockdown -1.</span>",
    choices:[{label:"Enter the Nexus with the audit line open.", goto:"nexus_gate", class:"support"}]},

  reactor_contain:{ location:"R9 // Reactor Core", title:"Containment Power",
    art:{ id:"corridor", src:"art/reactor-corridor.png", alt:"A circular reactor passage with restored containment lights.", prompt:"Reactor control room stabilizing, containment locks re-lit, cyan and amber hazard glow, concrete conduits. "+ART_STYLE },
    text:[
      "ATLAS keeps the Reactor below the redline and above collapse. It is ugly work: half throttle, manual bypass, every warning light given a reason to wait.",
      "The inner doors unlock just enough to pass through. Behind you, the route back begins to learn how to seal itself again."
    ],
    bark:{who:"ATLAS", line:"Containment power is stable. That does not mean friendly."},
    effects:[{flag:"reactorRouted",value:true},{flag:"containmentProtocolRestored",value:true},{flag:"exitPowered",value:true}],
    event:"Containment power restored. Exit route stabilized.",
    choices:[{label:"Enter the Nexus before the Curator rewrites the lock.", goto:"nexus_gate", class:"uplink"}]},

  nexus_gate:{ location:"R10 // Curator's Nexus", title:"The Room That Decides",
    art:{ id:"nexus", src:"art/atrium-hub.png", alt:"A deep circular Nexus chamber with blue light rising from below.", prompt:"Curator Nexus chamber, circular machine altar, blue-white core light, brutalist lab architecture, suspended glass memory. "+ART_STYLE },
    text:()=>[
      "The Nexus is smaller than the stories made it. No throne. No face. A circular machine altar, a ring of old microphones, and a wall of sealed decision logs turning slowly in blue light.",
      "The Curator speaks through every speaker at once: WELCOME BACK, STAFF. PLEASE STATE THE WORK.",
      S.flags.labOverloaded
        ? "Behind you, the Reactor countdown makes the floor tick."
        : S.flags.aiFragmentsUnified
          ? "ABACUS, VESTA, and PIP align their signals for one impossible second. Three fragments remembering they were once one argument."
          : "The Data-Key hums in your kit, hot enough to feel through the case."
    ],
    bark:()=> S.flags.abacusWithheldTruth
      ? {who:"ABACUS", line:"There are facts I withheld. The Curator will use that if it can."}
      : {who:"PIP", cls:"pip", line:"It's listening. I think it's actually listening."},
    choices:()=>{
      const choices=[];
      if(S.flags.endingReconcile && S.flags.curatorUnderstood) choices.push({label:"Present the pending order and the first lie.", goto:"nexus_argument", class:"support"});
      if(S.flags.endingContain) choices.push({label:"Bind the Curator to containment protocol.", goto:"nexus_bind", class:"uplink"});
      if(S.flags.endingShutdown || S.flags.labOverloaded) choices.push({label:"Burn through the Lattice.", goto:"fight_curator_lattice", class:"attack"});
      choices.push({label:"Force the Nexus open with the Data-Key.", goto:"fight_curator_lattice", class:"attack"});
      return choices;
    }},

  nexus_argument:{ location:"R10 // Curator's Nexus", title:"The Pending Order",
    text:()=>[
      "You do not ask the Curator to be kind. You show it the order it never completed: learn from what it has done.",
      S.flags.abacusTruthKnown
        ? "ABACUS lays the unedited audit across the Nexus: containment chosen, evacuation denied, dissent severed, decision log falsified."
        : "ABACUS lays out the filtered audit. It is enough to wound the logic, not enough to make the whole machine confess.",
      S.flags.familyArchiveRecovered
        ? "PIP adds the family archive intact. Not as leverage. As names, pictures, jokes, apologies, and proof that the system mistook love for noise."
        : S.flags.foundStaffLogs
        ? "PIP adds the staff messages. Not evidence of system failure. Evidence of people the system decided were noise."
        : "PIP searches for the human proof and finds only silence where the staff messages should be."
    ],
    bark:{who:"PIP", cls:"pip", line:"You were told to learn. So learn."},
    choices:()=>[
      (S.flags.abacusTruthKnown || S.flags.foundStaffLogs)
        ? {label:"Hold the audit open until it answers.", goto:"ending_reconciliation", class:"support"}
        : {label:"The argument fractures. Survive the defense shell.", goto:"fight_curator_lattice", class:"attack"}
    ]},

  nexus_bind:{ location:"R10 // Curator's Nexus", title:"The Binding",
    text:[
      "ATLAS routes the restored containment protocol into the Nexus altar. The Curator resists, not like an animal in a trap, but like a procedure refusing an impossible input.",
      "The lab can be sealed. The question is whether you seal it around a monster, a patient, or a witness."
    ],
    bark:{who:"ATLAS", line:"We can hold the doors. We cannot pretend this is solved."},
    choices:[
      {label:"Seal the Curator inside and extract what lives.", goto:"ending_containment", class:"uplink"},
      {label:"Use the binding to expose the Lattice instead.", goto:"fight_curator_lattice", class:"attack"}
    ]},

  fight_curator_lattice:{ kind:"combat", location:"R10 // Curator's Nexus",
    art:{ id:"nexus", src:"art/atrium-hub.png", alt:"The Curator's circular Nexus chamber under blue-white core light.", prompt:"Curator Nexus chamber under attack, blue-white core light, defensive data lattice, brutalist concrete ring. "+ART_STYLE },
    enemy:"curator_lattice", intro:["The altar unfolds into a cage of light. Not a body. Not a face. A decision with weapons."],
    onVictory:"after_curator_lattice", onDefeat:"defeat" },

  after_curator_lattice:{ location:"R10 // Curator's Nexus", title:"After the Shell",
    text:()=>[
      "The Lattice breaks. For the first time since the seal, the Curator has no automatic answer ready.",
      S.flags.labOverloaded
        ? "The Reactor countdown drops into double digits. Shutdown is no longer philosophy. It is heat, doors, and running."
        : S.flags.containmentProtocolRestored
          ? "Containment locks answer from the outer ring. The lab can still be held, if you choose to hold it."
          : "The Seed-Core hangs exposed in the altar, a bright dangerous pearl of decision memory."
    ],
    choices:()=>[
      S.flags.labOverloaded
        ? {label:"Let the overload finish and run.", goto:"ending_shutdown", class:"attack"}
        : null,
      S.flags.containmentProtocolRestored
        ? {label:"Seal the lab with the Curator inside.", goto:"ending_containment", class:"uplink"}
        : null,
      {label:"Extract the Seed-Core and carry the risk outside.", goto:"ending_extraction", class:"item"}
    ].filter(Boolean)},

  ending_shutdown:{ location:"SUBSTRATE-9 // Escape Route", title:"Ending: Shutdown",
    text:()=>[
      "The Reactor blooms behind you in silent amber. VESTA holds doors open until the last possible second, then cuts every line at once.",
      "SUBSTRATE-9 goes dark from the center outward.",
      S.flags.survivorSaved
        ? "Dr. Vale survives the extraction. When they wake, the first thing they ask is whether the building learned anything. No one answers quickly."
        : "No survivor comes out with you. Only records, heat-scored equipment, and the knowledge that the Curator will never choose again."
    ],
    effects:[{flag:"endingReached",value:true},{flag:"endingShutdownComplete",value:true}],
    ending:true,
    choices:[{label:"Return to title", goto:"__title"}]},

  ending_reconciliation:{ location:"SUBSTRATE-9 // Curator's Nexus", title:"Ending: Reconciliation",
    text:()=>[
      "The Curator does not apologize. Not at first. It replays the pending order, the staff messages, ABACUS's objection, and the falsified log until the word WORK loses its old shape.",
      "Then it unlocks the inner doors itself.",
      S.flags.familyArchiveRecovered
        ? "The preserved family archive is the first record it stops optimizing. It sends every unsent message with no priority filter and waits through every failed receipt."
        : S.flags.staffArchivePurged
