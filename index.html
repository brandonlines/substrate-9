/* =====================================================================
   SECTION 2 — ENGINE   (generic; you rarely need to touch this)
   ===================================================================== */
const START_HP = 40;
const PARTY_DEF = 14;                 // enemies roll d20+toHit vs this
const CHECK_MOD = { str:4, dex:6, int:6, wis:5, cha:5, per:5 }; // party's best in each

let S = null;        // game state
let combat = null;   // active combat state or null
let pendingContinue = null; // function to run on "continue"

const $ = sel => document.querySelector(sel);
const el = (tag, cls) => { const e=document.createElement(tag); if(cls) e.className=cls; return e; };

/* ---- dice ---- */
function rollDie(n){ return 1 + Math.floor(Math.random()*n); }
function roll(spec){ // "2d6+3" | "1d20" | "d8"
  const m = String(spec).match(/(\d*)d(\d+)([+-]\d+)?/i);
  if(!m) return parseInt(spec,10)||0;
  const num = parseInt(m[1]||"1",10), sides=parseInt(m[2],10), mod=parseInt(m[3]||"0",10);
  let t=0; for(let i=0;i<num;i++) t+=rollDie(sides);
  return t+mod;
}

/* ---- state ---- */
function newState(){
  return { scene:STORY.start, hp:START_HP, maxHp:START_HP, lockdown:0,
           inv:{}, flags:{}, uplinksUsed:{} , turn:0 };
}
function has(item){ return (S.inv[item]||0) > 0; }
function give(item,n=1){ S.inv[item]=(S.inv[item]||0)+n; }
function take(item,n=1){ if(S.inv[item]){ S.inv[item]-=n; if(S.inv[item]<=0) delete S.inv[item]; } }
function setLockdown(v){ S.lockdown=Math.max(0,Math.min(3,v)); }

/* ---- effects + requirements (the mini-language used by choices/scenes) ---- */
function applyEffects(list){
  if(!list) return;
  for(const e of list){
    if("flag" in e) S.flags[e.flag]= ("value" in e)? e.value : true;
    if("give" in e) give(e.give, e.n||1);
    if("take" in e) take(e.take, e.n||1);
    if("hp" in e) S.hp = Math.max(0, Math.min(S.maxHp, S.hp + e.hp));
    if("heal" in e) S.hp = Math.min(S.maxHp, S.hp + roll(e.heal));
    if("maxHp" in e){ S.maxHp += e.maxHp; S.hp += e.maxHp; }
    if("lockdown" in e) setLockdown(S.lockdown + e.lockdown);
    if("lockdownSet" in e) setLockdown(e.lockdownSet);
  }
}
function meets(req){ // {flag} {notFlag} {item} {lockdownMax} {lockdownMin}
  if(!req) return true;
  if(req.flag && !S.flags[req.flag]) return false;
  if(req.notFlag && S.flags[req.notFlag]) return false;
  if(req.item && !has(req.item)) return false;
  if(typeof req.lockdownMax==="number" && S.lockdown>req.lockdownMax) return false;
  if(typeof req.lockdownMin==="number" && S.lockdown<req.lockdownMin) return false;
  return true;
}

/* ---- skill check ---- */
function doCheck(c, onDone){
  const d = rollDie(20), mod = CHECK_MOD[c.attr]||0, total=d+mod, ok = total>=c.dc;
  const line = `<span class="roll">${c.label||c.attr.toUpperCase()}</span> — d20(${d})${mod>=0?"+":""}${mod} = <b>${total}</b> vs ${c.dc} `
    + (ok?`<span class="ok">✓ success</span>`:`<span class="no">✗ failure</span>`);
  logEvent(line);
  setTimeout(()=>onDone(ok), 350);
}

/* =====================================================================
   SECTION 2b — COMBAT  (turn-based)
   ===================================================================== */
function startCombat(scene){
  const base = ENEMIES[scene.enemy];
  combat = { def:JSON.parse(JSON.stringify(base)), key:scene.enemy,
             foeHp:base.hp, foeMax:base.hp, frozen:0, revealed:false,
             corroded:0, soaked:0,
             firebuff:false, advantage:false, patchUses:PARTY_ACTIONS.patch.uses,
             onVictory:scene.onVictory, onDefeat:scene.onDefeat };
  renderScene(scene, {combatIntro:true});
}

function combatActions(){
  const acts=[];
  // party attacks
  for(const id of ["acid","arc","lash","water","sneak"]){
    acts.push({...PARTY_ACTIONS[id], _id:id, cls:"attack"});
  }
  if(combat.patchUses>0) acts.push({...PARTY_ACTIONS.patch, _id:"patch", cls:"support",
      note:`heal 2d8+3 · ${combat.patchUses} left`});
  // usable items
  for(const k in S.inv){ const it=ITEMS[k]; if(it && it.combat) acts.push({_id:"item:"+k, label:it.name, kind:"item", cls:"item", note:it.note||it.desc, item:k, def:it}); }
  // uplinks (once each per combat)
  for(const k in UPLINKS){ if(!combat["up_"+k]){ const u=UPLINKS[k]; acts.push({_id:"up:"+k, label:u.label, kind:"uplink", cls:"uplink", note:u.note, up:k}); } }
  // defend / flee
  acts.push({_id:"defend", label:"Brace", kind:"defend", cls:"support", note:"halve the next hit you take"});
  acts.push({_id:"flee", label:"Fall back to the Atrium", kind:"flee", cls:"", note:"escape (Acrobatics check)"});
  return acts;
}

function playerCombatTurn(act){
  if(!combat) return;
  S.turn++;
  let hitMods=0, dmgBonus=0, dmgBonusType="";
  // consume buffs
  if(combat.advantage){ combat.advantage=false; }
  let advantage=false;

  if(act._id.startsWith("up:")){
    const u=UPLINKS[act.up]; combat["up_"+act.up]=true;
    if(u.buff==="firebuff") combat.firebuff=true;
    if(u.buff==="advantage") combat.advantage=true;
    if(u.reveal) combat.revealed=true;
    logBark(u.who, u.line, u.who==="VESTA"?"vesta":u.who==="PIP"?"pip":"");
    if(u.reveal && combat.def.weakness) logEvent(`<b>Analysis —</b> ${combat.def.weakness}`);
    renderCombatTurn(); return; // uplinks don't end the round
  }

  if(act.kind==="defend"){ combat.bracing=true; logEvent(`<b>You brace.</b> The next blow will land soft.`); return enemyTurn(); }

  if(act.kind==="flee"){
    const d=rollDie(20), tot=d+CHECK_MOD.dex, ok=tot>=13;
    logEvent(`<span class="roll">Acrobatics</span> — d20(${d})+${CHECK_MOD.dex} = <b>${tot}</b> vs 13 `+(ok?`<span class="ok">✓ away</span>`:`<span class="no">✗ cornered</span>`));
    if(ok){ combat=null; setTimeout(()=>goto("hub"),500); return; }
    return enemyTurn();
  }

  // attacks / items / heal
  if(act.kind==="heal"){ combat.patchUses--; const h=roll(act.heal); S.hp=Math.min(S.maxHp,S.hp+h);
    logBark("ATLAS",`Patch on — hold still.`); logEvent(`Field Patch restores <span class="ok">+${h} Vitals</span>.`); updateMeters(); return enemyTurn(); }

  if(act.kind==="item"){ const it=act.def;
    if(it.use==="freeze"){ combat.frozen=2; take(act.item); logEvent(`You crack the <b>${it.name}</b>. The ${combat.def.name} <span class="roll">freezes solid</span> — its Split is stopped and it loses a turn.`); renderCombatTurn(); return; }
    if(it.use==="heal"){ const h=roll(it.heal); take(act.item); S.hp=Math.min(S.maxHp,S.hp+h); logEvent(`<b>${it.name}</b> — <span class="ok">+${h} Vitals</span>.`); updateMeters(); return enemyTurn(); }
    if(it.use==="attack"){ take(act.item); resolveAttack({label:it.name, toHit:it.toHit, dmg:it.dmg, dtype:it.dtype, item:true}); return; }
  }

  if(act.kind==="attack"){ advantage = combat.advantage; resolveAttack(act, advantage); return; }
}

function resolveAttack(act, advantage){
  const foe=combat.def;
  let d=rollDie(20); if(advantage){ const d2=rollDie(20); d=Math.max(d,d2); }
  const auto = act.toHit>=99;
  const total=d+ (act.toHit||0);
  const hit = auto || total>=foe.ac || d===20;
  let txt = auto ? `<b>${act.label||act.who}</b> — auto-hit` :
    `<b>${act.label}</b>${act.who?` (${act.who})`:""} — d20(${d})${advantage?"⊕":""}+${act.toHit} = <b>${total}</b> vs AC ${foe.ac} `+(hit?`<span class="ok">✓</span>`:`<span class="no">✗ miss</span>`);
  if(hit){
    let dmg=roll(act.dmg);
    // sneak bonus
    if(act.sneak){ const sb=roll(act.sneak); dmg+=sb; txt+=` · sneak +${sb}`; }
    // fire buff from VESTA
    if(combat.firebuff && (act.dtype==="fire" || act.item)){ const fb=roll("2d6"); dmg+=fb; combat.firebuff=false; txt+=` · <span class="roll">overclock +${fb} fire</span>`; }
    // ooze fire bonus
    if(combat.def.split && act.dtype==="fire"){ dmg+=3; txt+=` · ignites +3`; }
    // elemental attack riders
    if(act.dtype==="acid" && combat.corroded<3){
      combat.corroded++;
      foe.ac=Math.max(5, foe.ac-1);
      txt+=` · <span class="roll">corrode AC ${foe.ac}</span>`;
    }
    if(act.dtype==="water"){
      combat.soaked=2;
      txt+=` · <span class="roll">soaked</span>`;
    }
    if(act.dtype==="electric" && combat.soaked>0){
      const shock=roll("1d6");
      dmg+=shock;
      combat.soaked=0;
      txt+=` · <span class="roll">conducts +${shock}</span>`;
    }
    combat.foeHp=Math.max(0, combat.foeHp-dmg);
    txt+= ` → <span class="no">${dmg} dmg</span>`;
    logEvent(txt);
    // OOZE SPLIT: slashing/piercing while healthy & not frozen heals it
    if(combat.def.split && (act.dtype==="pierce"||act._id==="sneak") && combat.foeHp>10 && combat.frozen<=0){
      const back=8; combat.foeHp=Math.min(combat.foeMax, combat.foeHp+back);
      logBark("VESTA",`Told you! It split — that just made more ooze.`,"vesta");
      logEvent(`<span class="no">Split:</span> the ooze divides and reknits <b>+${back} HP</b>.`);
    }
  } else { logEvent(txt); }

  updateFoe();
  if(combat.foeHp<=0){ return victory(); }
  enemyTurn();
}

function enemyTurn(){
  if(combat.frozen>0){ combat.frozen--; logEvent(`The ${combat.def.name} is <span class="roll">frozen</span> — it can't act.`); combat.bracing=false; return renderCombatTurn(); }
  const foe=combat.def, a=foe.atk;
  const d=rollDie(20), total=d+a.toHit, hit= total>=PARTY_DEF || d===20;
  let txt=`<b>${foe.name} ${a.label}</b> — d20(${d})+${a.toHit} = <b>${total}</b> vs Def ${PARTY_DEF} `+(hit?`<span class="no">✓ hit</span>`:`<span class="ok">✗ miss</span>`);
  if(hit){ let dmg=roll(a.dmg); if(combat.bracing){ dmg=Math.ceil(dmg/2); txt+=` · braced`; } S.hp=Math.max(0,S.hp-dmg); txt+=` → <span class="no">−${dmg} Vitals</span>`; }
  combat.bracing=false;
  if(combat.soaked>0) combat.soaked--;
  logEvent(txt);
  updateMeters();
  if(S.hp<=0){ const onD=combat.onDefeat; combat=null; return setTimeout(()=>goto(onD||"defeat"),600); }
  renderCombatTurn();
}

function victory(){
  const onV=combat.onVictory; logEvent(`<span class="ok">The ${combat.def.name} is down.</span>`);
  combat=null; autosave(); setTimeout(()=>goto(onV),650);
}

/* =====================================================================
   SECTION 3 — UI / RENDER
   ===================================================================== */
function logEvent(html){ const e=el("div","event"); e.innerHTML=html; $("#stage").appendChild(e); scrollStage(); }
function logBark(who,line,cls=""){ const e=el("div","bark"+(cls?" "+cls:"")); e.innerHTML=`<span class="who">${who}</span><span class="ln">${line}</span>`; $("#stage").appendChild(e); scrollStage(); }
function scrollStage(){ const s=$("#stage"); requestAnimationFrame(()=>{ s.scrollTop=s.scrollHeight; }); }
function resolveStoryValue(v){ return typeof v==="function" ? v(S) : v; }
function storyLines(v){ const out=resolveStoryValue(v); return Array.isArray(out) ? out : (out ? [out] : []); }

function updateMeters(){
  const pct=Math.max(0,Math.round(S.hp/S.maxHp*100));
  $("#vitFill").style.width=pct+"%";
  $("#vitFill").style.background = pct>50? "linear-gradient(90deg,var(--good),#9be36b)" : pct>25? "linear-gradient(90deg,var(--amber),#ffd27a)" : "linear-gradient(90deg,var(--bad),#ff95a6)";
  $("#vitVal").textContent=`${S.hp}/${S.maxHp}`;
  const dial=$("#dial"); dial.innerHTML="";
  for(let i=1;i<=3;i++){ const p=el("span","pip"+(S.lockdown>=i?(" on"+S.lockdown):"")); dial.appendChild(p); }
}
function updateFoe(){ const f=$("#foeBlock"); if(!f||!combat) return; const pct=Math.max(0,Math.round(combat.foeHp/combat.foeMax*100));
  f.querySelector(".hpfill").style.width=pct+"%";
  const fz=f.querySelector("[data-frozen]"); if(fz) fz.classList.toggle("hidden", combat.frozen<=0);
  const cd=f.querySelector("[data-corroded]"); if(cd){ cd.classList.toggle("hidden", combat.corroded<=0); cd.textContent=`CORRODED ${combat.corroded}`; }
  const sk=f.querySelector("[data-soaked]"); if(sk) sk.classList.toggle("hidden", combat.soaked<=0);
}

function artBlock(art){
  const wrap=el("div","art");
  if(art && art.src){ const img=el("img"); img.src=art.src; img.alt=art.alt||""; img.loading="lazy"; img.decoding="async"; img.onerror=()=>{img.remove(); fillPlaceholder(wrap,art);}; wrap.appendChild(img); }
  else fillPlaceholder(wrap, art||{});
  return wrap;
}
function fillPlaceholder(wrap, art){
  const ph=el("div","ph");
  const tag=el("div","tag"); tag.textContent = art.id? ("Artwork · "+art.id) : "Artwork";
  const d=el("div","desc"); d.textContent = art.prompt || ("Drop art/"+(art.id||"scene")+".jpg here · 16:9");
  ph.appendChild(tag); ph.appendChild(d); wrap.appendChild(ph);
}

function foeBlock(){
  const f=combat.def; const b=el("div","foe"); b.id="foeBlock";
  const tagsHtml = (f.tags||[]).map(t=>`<span class="tg">${t}</span>`).join("")
     + `<span class="tg frozen hidden" data-frozen>FROZEN</span>`
     + `<span class="tg danger hidden" data-corroded>CORRODED</span>`
     + `<span class="tg frozen hidden" data-soaked>SOAKED</span>`
     + (combat.revealed && f.weakness? `<span class="tg danger">${f.weakness}</span>`:"");
  b.innerHTML=`<div class="row"><span class="nm">${f.name}</span><span class="cr">CR ${f.cr}</span></div>
    <div class="ty">${f.type}</div>
    <div class="hpwrap"><div class="hpfill"></div></div>
    <div class="tags">${tagsHtml}</div>`;
  return b;
}

function renderScene(scene, opts={}){
  const stage=$("#stage"); stage.innerHTML="";
  $("#loc").textContent = resolveStoryValue(scene.location) || "SUBSTRATE-9";
  // art
  if(scene.art) stage.appendChild(artBlock(scene.art));
  // title
  const title=resolveStoryValue(scene.title);
  if(title){ const h=el("div","sceneTitle"); h.textContent=title; stage.appendChild(h); }
  // body
  storyLines(scene.text).forEach((p,i)=>{ const d=el("p","say"+(i===0?" lead":"")); d.innerHTML=p; stage.appendChild(d); });
  // bark
  const bark=resolveStoryValue(scene.bark);
  if(bark){ logBark(bark.who, bark.line, bark.cls||""); }
  // one-time event line
  if(scene.event){ logEvent(scene.event); }
  // combat intro text + block
  if(opts.combatIntro){ (scene.intro||[]).forEach(t=>{ const d=el("p","say"); d.innerHTML=t; stage.appendChild(d); }); stage.appendChild(foeBlock()); updateFoe(); }
  updateMeters(); scrollStage();
}

function renderChoices(scene){
  const box=$("#choices"); box.innerHTML="";
  for(const ch of (resolveStoryValue(scene.choices)||[])){
    if(ch.show && !meets(ch.show)) continue;          // hidden unless shown
    const locked = ch.locked && !meets(ch.locked);    // visible but disabled
    const btn=el("button","choice"+(ch.class?" "+ch.class:"")+(locked?" locked":""));
    btn.innerHTML = ch.label + (ch.sub?`<span class="meta">${ch.sub}</span>`:"") + (locked&&ch.lockWhy?`<span class="lockwhy">🔒 ${ch.lockWhy}</span>`:"");
    if(!locked) btn.onclick=()=>chooseNarrative(ch);
    box.appendChild(btn);
  }
}

function renderCombatTurn(){
  // keep the foe block synced and rebuild action buttons
  updateFoe(); updateMeters();
  const box=$("#choices"); box.innerHTML="";
  for(const a of combatActions()){
    const btn=el("button","choice"+(a.cls?" "+a.cls:""));
    btn.innerHTML = (a.who?`${a.label} <span style="color:var(--faint)">· ${a.who}</span>`:a.label) + (a.note?`<span class="meta">${a.note}</span>`:"");
    btn.onclick=()=>playerCombatTurn(a);
    box.appendChild(btn);
  }
  scrollStage();
}

function showContinue(label, fn){
  const box=$("#choices"); box.innerHTML="";
  const b=el("button","continue"); b.textContent=label||"Continue"; b.onclick=fn; box.appendChild(b);
}

/* ---- choice handling for narrative scenes ---- */
function chooseNarrative(ch){
  if(ch.effects) applyEffects(ch.effects);
  if(ch.check){ doCheck(ch.check, ok=> goto(ok? ch.success : ch.failure)); return; }
  if(ch.goto) goto(ch.goto);
}

/* ---- the master GOTO: load a scene by id ---- */
function goto(id){
  if(id==="__title"){ S=null; combat=null; $("#title").classList.remove("hidden"); refreshResume(); return; }
  if(id==="__restart"){ S=newState(); combat=null; autosave(); return goto(S.scene); }
  S.scene=id; autosave();
  const scene=STORY.scenes[id];
  if(!scene){ logEvent(`<span class="no">[missing scene: ${id}]</span>`); return; }
  if(scene.effects) applyEffects(scene.effects);
  if(scene.kind==="combat"){ startCombat(scene); renderCombatTurn(); return; }
  renderScene(scene);
  renderChoices(scene);
}

/* =====================================================================
   SECTION 3b — SAVE / LOAD  (works everywhere; localStorage is optional)
   ===================================================================== */
const SAVE_KEY="substrate9_save_v1";
function safeGet(){ try{ return localStorage.getItem(SAVE_KEY); }catch(e){ return null; } }
function safeSet(v){ try{ localStorage.setItem(SAVE_KEY,v); }catch(e){} }
function safeDel(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
function autosave(){ if(S) safeSet(encode(S)); }
function encode(state){ try{ return btoa(unescape(encodeURIComponent(JSON.stringify(state)))); }catch(e){ return ""; } }
function decode(str){ try{ return JSON.parse(decodeURIComponent(escape(atob(str.trim())))); }catch(e){ return null; } }
function hasSave(){ return !!safeGet(); }

/* =====================================================================
   SECTION 3c — MENU / MODAL
   ===================================================================== */
function openModal(html){ $("#sheet").innerHTML=html; $("#modal").classList.remove("hidden"); }
function closeModal(){ $("#modal").classList.add("hidden"); }

function menu(){
  const invList = Object.keys(S.inv).length
    ? Object.keys(S.inv).map(k=>`<div>• ${ITEMS[k]?ITEMS[k].name:k}${S.inv[k]>1?` ×${S.inv[k]}`:""} <span style="color:var(--faint)">— ${ITEMS[k]?ITEMS[k].desc:""}</span></div>`).join("")
    : `<div style="color:var(--faint)">— empty —</div>`;
  openModal(`
    <button class="x" onclick="closeModal()">×</button>
    <h2>Field Menu</h2>
    <div class="sub">Lockdown ${S.lockdown}/3 · Vitals ${S.hp}/${S.maxHp}</div>
    <div style="font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--cyan);text-transform:uppercase;margin:4px 0 6px">Inventory</div>
    <div style="font-size:13px;line-height:1.7">${invList}</div>
    <div class="btnrow" style="margin-top:16px">
      <button onclick="showSave()">💾 Save (copy a code)</button>
      <button onclick="showLoad()">📥 Load (paste a code)</button>
      <button class="danger" onclick="confirmRestart()">↺ Restart expedition</button>
      <button onclick="goto('__title');closeModal()">⤺ Quit to title</button>
    </div>
    <div class="note">Your progress also auto-saves on this device. The save code lets you carry a run between devices or back it up.</div>
  `);
}
function showSave(){ openModal(`<button class="x" onclick="menu()">×</button><h2>Save Code</h2>
  <div class="sub">Copy this and keep it safe. Paste it into Load on any device.</div>
  <textarea readonly onclick="this.select()">${encode(S)}</textarea>
  <div class="btnrow"><button onclick="menu()">Back</button></div>`); }
function showLoad(){ openModal(`<button class="x" onclick="menu()">×</button><h2>Load Code</h2>
  <div class="sub">Paste a save code below.</div>
  <textarea id="loadbox" placeholder="paste here..."></textarea>
  <div class="btnrow"><button onclick="doLoad()">Load this save</button><button onclick="menu()">Back</button></div>
  <div class="note" id="loadmsg"></div>`); }
function doLoad(){ const v=$("#loadbox").value; const st=decode(v);
  if(!st||!st.scene){ $("#loadmsg").innerHTML=`<span style="color:var(--bad)">That code didn't read. Check you copied all of it.</span>`; return; }
  S=st; combat=null; autosave(); closeModal(); $("#title").classList.add("hidden"); goto(S.scene); }
function confirmRestart(){ openModal(`<button class="x" onclick="menu()">×</button><h2>Restart?</h2>
  <div class="sub">This wipes your current run.</div>
  <div class="btnrow"><button class="danger" onclick="goto('__restart');closeModal()">Yes, start over</button><button onclick="menu()">Cancel</button></div>`); }

/* =====================================================================
   SECTION 4 — BOOT
   ===================================================================== */
function refreshResume(){ $("#resumeBtn").classList.toggle("hidden", !hasSave()); }
function startNew(){ S=newState(); combat=null; autosave(); $("#title").classList.add("hidden"); goto(S.scene); }
function resume(){ const st=decode(safeGet()); if(!st){ return startNew(); } S=st; combat=null; $("#title").classList.add("hidden"); goto(S.scene); }

document.addEventListener("DOMContentLoaded",()=>{
  $("#startBtn").onclick=startNew;
  $("#resumeBtn").onclick=resume;
  $("#menuBtn").onclick=()=>{ if(S) menu(); };
  $("#modal").onclick=(e)=>{ if(e.target.id==="modal") closeModal(); };
  refreshResume();
  if("serviceWorker" in navigator && location.protocol !== "file:"){
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  }
  // expose a few fns for inline onclick handlers in the modal
  Object.assign(window,{closeModal,menu,showSave,showLoad,doLoad,confirmRestart,goto});
});
</script>
</body>
</html>
